{% extends "gallery/base.html" %}

{% block title %}詳細{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-xl-10">
        <div class="band-panel p-3 p-md-4">
            <div class="mb-4">
                <h1 class="h2 mb-2">{{ obj.title|default:obj.file.name }}</h1>
                <p class="page-subtitle mb-0">
                    {{ obj.uploaded_at|date:"Y/m/d H:i" }}
                </p>
            </div>

            <div class="detail-media mb-4">
                {% if obj.media_type == "photo" %}
                    <img src="{{ obj.file.url }}" alt="{{ obj.title|default:obj.file.name }}">
                {% else %}
                    <video controls>
                        <source src="{{ obj.file.url }}">
                    </video>
                {% endif %}
            </div>

            <div class="d-flex gap-2 flex-wrap">
                <a href="{% url 'media_list' %}" class="btn btn-band-outline">戻る</a>
                <a href="{% url 'delete_media' obj.id %}" class="btn btn-outline-danger">削除</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
