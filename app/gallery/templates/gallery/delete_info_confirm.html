{% extends "gallery/base.html" %}

{% block title %}жҠ•зЁҝзҲҶз ҙ{% endblock %}

{% block content %}
<div class="row justify-content-center">
<div class="col-12 col-md-8 col-lg-6">
<div class="band-panel p-4">
<h2 class="mb-3 text-danger">зҲҶз ҙгҒҷгӮӢпјҹ</h2>

<div class="mb-3">
<div class="small-muted mb-2">
{{ obj.owner.username }} / {{ obj.created_at|date:"Y/m/d H:i" }}
</div>
<div>{{ obj.content|linebreaks }}</div>
</div>

<form method="post">
{% csrf_token %}
<button type="submit" class="btn btn-danger">зҲҶз ҙ</button>
<a href="{% url 'band_info' %}" class="btn btn-band-outline">жҲ»гӮӢ</a>
</form>
</div>
</div>
</div>
{% endblock %}
