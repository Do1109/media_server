<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Band Media{% endblock %}</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        :root {
            --band-bg: #0d0d10;
            --band-bg-2: #14151a;
            --band-surface: rgba(23, 24, 29, 0.94);
            --band-surface-2: rgba(31, 32, 39, 0.96);
            --band-border: rgba(255,255,255,0.09);
            --band-text: #f4f4f6;
            --band-muted: #aaadb8;
            --band-accent: #b3122d;
            --band-accent-2: #ff4d6d;
            --band-danger: #ff4d6d;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(255, 77, 109, 0.16), transparent 26%),
                radial-gradient(circle at top right, rgba(179, 18, 45, 0.10), transparent 24%),
                linear-gradient(180deg, #09090b 0%, #101116 55%, #14151a 100%);
            color: var(--band-text);
            font-family:
                "Yu Gothic",
                "Meiryo",
                "Hiragino Kaku Gothic ProN",
                sans-serif;
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, .navbar-brand {
            font-family:
                "Yu Mincho",
                "Hiragino Mincho ProN",
                "MS PMincho",
                serif;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        a {
            color: #ff9fb0;
            text-decoration: none;
        }

        a:hover {
            color: #ffd0d8;
        }

        .navbar-band {
            background: rgba(8, 8, 10, 0.88);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .navbar-brand {
            color: #fff !important;
            font-size: 1.35rem;
        }

        .page-subtitle {
            color: var(--band-muted);
        }

        .band-panel {
            background: var(--band-surface);
            border: 1px solid var(--band-border);
            border-radius: 18px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.28);
        }

        .form-label,
        .text-muted,
        .small-muted {
            color: var(--band-muted) !important;
        }

        .form-select,
        .form-control {
            background: #111217;
            color: var(--band-text);
            border: 1px solid rgba(255,255,255,0.11);
        }

        .form-select:focus,
        .form-control:focus {
            background: #111217;
            color: var(--band-text);
            border-color: var(--band-accent-2);
            box-shadow: 0 0 0 0.25rem rgba(255, 77, 109, 0.14);
        }

        .form-control::file-selector-button {
            background: #1b1c22;
            color: var(--band-text);
            border: none;
            margin-right: 12px;
            padding: 8px 12px;
        }

        .btn-band {
            background: linear-gradient(135deg, var(--band-accent), var(--band-accent-2));
            border: none;
            color: #fff;
        }

        .btn-band:hover {
            background: linear-gradient(135deg, #970f25, #f24364);
            color: #fff;
        }

        .btn-band-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.18);
            color: #fff;
        }

        .btn-band-outline:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .media-card {
            background: linear-gradient(180deg, rgba(26, 27, 33, 0.97), rgba(18, 19, 24, 0.99));
            border: 1px solid var(--band-border);
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            box-shadow: 0 10px 26px rgba(0,0,0,0.22);
        }

        .media-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.36);
            border-color: rgba(255,255,255,0.15);
        }

        .media-thumb-wrap {
            position: relative;
            overflow: hidden;
            background: #0a0a0d;
        }

        .media-thumb {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        .media-card:hover .media-thumb {
            transform: scale(1.05);
            opacity: 0.95;
        }

        .media-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.74);
            border: 1px solid rgba(255,255,255,0.10);
            color: #fff;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            border-radius: 999px;
            padding: 0.35rem 0.7rem;
        }

        .media-title {
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.35rem;
            word-break: break-word;
        }

        .media-meta {
            color: var(--band-muted);
            font-size: 0.88rem;
        }

        .media-empty {
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--band-muted);
            background:
                linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));
        }

        .section-title {
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            margin-bottom: 0.3rem;
        }

        .detail-media {
            background: #0b0b0e;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }

        .detail-media img,
        .detail-media video {
            width: 100%;
            display: block;
            max-height: 75vh;
            object-fit: contain;
            background: #09090b;
        }

        .page-title{
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: .08em;
        text-shadow: 0 2px 12px rgba(255,40,80,.35);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
    {% if request.resolver_match.url_name != "login" %}
    <nav class="navbar navbar-expand-lg navbar-band mb-4">
        <div class="container py-2">
            <a class="navbar-brand" href="{% url 'media_list' %}">RONNA PORTAL</a>

            <div class="ms-auto d-flex gap-2">
                <a class="btn btn-band btn-sm px-3" href="{% url 'media_list' %}">Home</a>
              <a href="{% url 'band_info' %}" class="btn btn-band btn-sm px-3">Info</a>
                <a href="{% url 'upload_media' %}" class="btn btn-band btn-sm px-3">Upload</a>
                    <form method="post" action={% url 'logout' %} class='d-inline'>
                            {% csrf_token %}
                        <button type="submit" class="btn btn-band-outline btn-sm px-3">Logout</button>
                    </form>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
</body>
</html>
