{% extends "gallery/base.html" %}

{% block title %}アップロード{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-7 col-xl-6">
        <div class="band-panel p-4 p-md-5">
            <div class="mb-4">
                <h1 class="h2 mb-2">アップロード</h1>
                <p class="page-subtitle mb-0">写真や動画を追加します</p>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label" for="{{ form.media_type.id_for_label }}">メディア種別</label>
                    {{ form.media_type }}
                </div>

                <div class="mb-3">
                    <label class="form-label" for="{{ form.title.id_for_label }}">タイトル</label>
                    {{ form.title }}
                </div>

                <div class="mb-4">
                    <label class="form-label" for="{{ form.file.id_for_label }}">ファイル</label>
                    {{ form.file }}
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-band">Upload</button>
                    <a href="{% url 'media_list' %}" class="btn btn-band-outline">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
